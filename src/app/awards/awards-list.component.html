<section class="page-header container">
  <p class="eyebrow">Recognition</p>
  <h1>Awards & Achievements</h1>
  <p class="lead">International mountaineering awards and expedition acknowledgments.</p>
</section>

<section class="container">
  <div *ngIf="isLoading" class="grid">
    <div class="skeleton card" *ngFor="let item of [1,2,3,4,5,6]"></div>
  </div>

  <div *ngIf="!isLoading && error" class="error">{{ error }}</div>

  <ng-container *ngIf="!isLoading && !error">
    <div class="grid" *ngIf="awards.length > 0; else emptyState">
      <app-award-card *ngFor="let award of awards" [award]="award" />
    </div>
  </ng-container>

  <ng-template #emptyState>
    <p class="empty">No awards listed yet.</p>
  </ng-template>
</section>
