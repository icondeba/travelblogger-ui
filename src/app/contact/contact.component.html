<section class="container contact">
  <div>
    <p class="eyebrow">Contact</p>
    <h1>Plan an expedition or request a collaboration.</h1>
    <p class="lead">
      Share your objective, timeline, and experience level. We will reply with a tailored expedition plan.
    </p>
    <div class="contact-details">
      <div>
        <h4>Basecamp Office</h4>
        <p>Leh, Ladakh · 194101</p>
      </div>
      <div>
        <h4>Email</h4>
        <a href="mailto:icondeba4@gmail.com">icondeba4&#64;gmail.com</a>
      </div>
      <div>
        <h4>Phone / WhatsApp</h4>
        <a href="https://wa.me/918902199900" target="_blank" rel="noopener">+91 89021 99900</a>
      </div>
    </div>
  </div>

  <form [formGroup]="contactForm" (ngSubmit)="submit()" class="contact-form">
    <label>
      Name
      <input type="text" formControlName="name" placeholder="Your name" />
      <small class="error-msg" *ngIf="contactForm.controls.name.touched && contactForm.controls.name.invalid">
        Name is required (minimum 2 characters).
      </small>
    </label>

    <label>
      Email
      <input type="email" formControlName="email" placeholder="you@example.com" />
      <small class="error-msg" *ngIf="contactForm.controls.email.touched && contactForm.controls.email.invalid">
        A valid email address is required.
      </small>
    </label>

    <label>
      Mobile Number
      <input type="tel" formControlName="phoneNumber" placeholder="+918902199900" />
      <small class="hint">Include country code, e.g. +918902199900</small>
      <small class="error-msg" *ngIf="contactForm.controls.phoneNumber.touched && contactForm.controls.phoneNumber.invalid">
        Enter a valid phone number with country code (e.g. +918902199900).
      </small>
    </label>

    <label>
      Message
      <textarea rows="5" formControlName="message" placeholder="Tell us about your objective"></textarea>
      <small class="error-msg" *ngIf="contactForm.controls.message.touched && contactForm.controls.message.invalid">
        Message is required (minimum 10 characters).
      </small>
    </label>

    <button class="btn-primary" type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Sending...' : 'Submit Request' }}
    </button>

    <p class="feedback" [class.success]="submissionSuccess" *ngIf="submissionMessage">
      {{ submissionMessage }}
    </p>
  </form>
</section>
