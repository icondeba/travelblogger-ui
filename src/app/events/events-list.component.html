<section class="page-header container">
  <p class="eyebrow">Events</p>
  <h1>Upcoming gatherings for the next ascent.</h1>
  <p class="lead">Workshops, planning sessions, and field drills led by our expedition team.</p>
</section>

<section class="container">
  <div *ngIf="isLoading" class="grid">
    <div class="skeleton card" *ngFor="let item of [1,2,3]"></div>
  </div>

  <div *ngIf="!isLoading && error" class="error">{{ error }}</div>

  <ng-container *ngIf="!isLoading && !error">
    <div class="grid" *ngIf="events.length > 0; else emptyState">
      <app-event-card *ngFor="let event of events" [event]="event" />
    </div>

    <div class="show-more" *ngIf="hasMore">
      <button type="button" class="btn-primary show-more-btn" (click)="loadMore()" [disabled]="isLoadingMore">
        {{ isLoadingMore ? 'Loading...' : 'Show More' }}
      </button>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <p class="empty">No events available right now.</p>
  </ng-template>
</section>
