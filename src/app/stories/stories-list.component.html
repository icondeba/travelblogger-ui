<section class="page-header container">
  <p class="eyebrow">Stories</p>
  <h1>Field notes from the mountains.</h1>
  <p class="lead">Expedition reports, lessons learned, and life above the snow line.</p>
</section>

<section class="container">
  <div *ngIf="isLoading" class="grid">
    <div class="skeleton card" *ngFor="let item of [1,2,3]"></div>
  </div>

  <div *ngIf="!isLoading && error" class="error">{{ error }}</div>

  <ng-container *ngIf="!isLoading && !error">
    <div class="grid" *ngIf="stories.length > 0; else emptyState">
      <app-story-card *ngFor="let story of stories" [story]="story" />
    </div>

    <div class="show-more" *ngIf="hasMore">
      <button type="button" class="btn-primary show-more-btn" (click)="loadMore()" [disabled]="isLoadingMore">
        {{ isLoadingMore ? 'Loading...' : 'Show More' }}
      </button>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <p class="empty">No stories available right now.</p>
  </ng-template>
</section>
